services:
  nginx:
    build: ./nginx
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    expose:
      - "8000"
    environment:
      APP_CONFIG__DB__USER: ${APP_CONFIG__DB__USER}
      APP_CONFIG__DB__PASSWORD: ${APP_CONFIG__DB__PASSWORD}
      APP_CONFIG__DB__HOST: ${APP_CONFIG__DB__HOST}
      APP_CONFIG__DB__PORT: ${APP_CONFIG__DB__PORT}
      APP_CONFIG__DB__NAME: ${APP_CONFIG__DB__NAME}
      APP_CONFIG__SECURITY__SECRET_KEY: ${APP_CONFIG__SECURITY__SECRET_KEY}
      APP_CONFIG__SECURITY__ACCESS_TOKEN_EXPIRE_MINUTES: ${APP_CONFIG__SECURITY__ACCESS_TOKEN_EXPIRE_MINUTES}
      APP_CONFIG__SECURITY__REFRESH_TOKEN_EXPIRE_DAYS: ${APP_CONFIG__SECURITY__REFRESH_TOKEN_EXPIRE_DAYS}
      APP_CONFIG__SECURITY__ALGORITHM: ${APP_CONFIG__SECURITY__ALGORITHM}
      APP_CONFIG__REDIS__HOST: ${APP_CONFIG__REDIS__HOST}
      APP_CONFIG__REDIS__PORT: ${APP_CONFIG__REDIS__PORT}
      APP_CONFIG__REDIS__DB: ${APP_CONFIG__REDIS__DB}
      APP_CONFIG__REDIS__MAX_CONNECTIONS: ${APP_CONFIG__REDIS__MAX_CONNECTIONS}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy 
    restart: unless-stopped
    volumes:
      - ./backend:/app

  db:
    image: postgres:17
    environment:
      POSTGRES_USER: ${APP_CONFIG__DB__USER}
      POSTGRES_PASSWORD: ${APP_CONFIG__DB__PASSWORD}
      POSTGRES_DB: ${APP_CONFIG__DB__NAME}
    expose:
      - "5432"
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_CONFIG__DB__USER} -d ${APP_CONFIG__DB__NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
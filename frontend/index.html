<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Syncro</title>
    <meta
      name="description"
      content="Syncro — веб-сервис для управления проектами, задачами, командами и рабочими созвонами"
    />

    <meta name="theme-color" content="#07110C" />

    <!-- Шрифты интерфейса -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: #f4f7f4;
      }

      body {
        min-height: 100%;
        font-family: "IBM Plex Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f7f4;
        color: #172019;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      #root {
        min-height: 100vh;
      }

      .loading {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at 35% 30%, rgba(56, 176, 0, 0.18), transparent 32%),
          radial-gradient(circle at 70% 70%, rgba(0, 107, 53, 0.18), transparent 34%),
          #07110c;
        color: #ffffff;
      }

      .loadingCard {
        width: min(360px, calc(100vw - 48px));
        padding: 32px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.06);
        box-shadow: 0 28px 70px rgba(0, 0, 0, 0.28);
        backdrop-filter: blur(18px);
        text-align: center;
      }

      .loadingBrand {
        font-family: "Manrope", "IBM Plex Sans", sans-serif;
        font-size: 32px;
        line-height: 1.1;
        font-weight: 800;
        letter-spacing: -0.04em;
        margin-bottom: 10px;
      }

      .loadingText {
        color: #b9c7bd;
        font-size: 15px;
        margin-bottom: 24px;
      }

      .loadingSpinner {
        width: 34px;
        height: 34px;
        margin: 0 auto;
        border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.16);
        border-top-color: #38b000;
        animation: syncroLoadingSpin 0.9s linear infinite;
      }

      @keyframes syncroLoadingSpin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div class="loading">
        <div class="loadingCard">
          <div class="loadingBrand">Syncro</div>
          <div class="loadingText">Загрузка рабочего пространства</div>
          <div class="loadingSpinner" aria-hidden="true"></div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
